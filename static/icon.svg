<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Ctrl-Plus-8K">
  <title>Ctrl-Plus-8K</title>
  <!--
    Favicon. Two flat blocks (low-res input) resolving into a fine, saturated
    grid (native 8K output) - the paper's premise in one mark. Carries its own
    dark tile so it reads on light and dark browser chrome alike, which is why
    there is no prefers-color-scheme switch here.
    Tuned for 16px: only four shapes, and the contrast that survives downscaling
    is flat-and-dull vs. bright-and-textured, not the gridlines themselves.
  -->
  <defs>
    <linearGradient id="hi" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0"   stop-color="#2dd4bf"/>
      <stop offset=".38" stop-color="#38bdf8"/>
      <stop offset=".72" stop-color="#a78bfa"/>
      <stop offset="1"   stop-color="#fb7185"/>
    </linearGradient>
    <!-- fine grid: at 16px these lines fall below a pixel and blur into texture,
         which is the intended read - detail, not countable cells -->
    <pattern id="grid" width="2.75" height="2.75" patternUnits="userSpaceOnUse">
      <path d="M2.75 0V2.75H0" fill="none" stroke="#0b1220" stroke-width=".6" opacity=".85"/>
    </pattern>
  </defs>

  <rect width="32" height="32" rx="7" fill="#0b1220"/>
  <rect x=".5" y=".5" width="31" height="31" rx="6.5" fill="none" stroke="#94a3b8" stroke-opacity=".18"/>

  <!-- low-res: two flat, chunky blocks. Opacity is set for the 16px case - any
       lower and these sink into the tile, leaving only the bright half visible. -->
  <g fill="#38bdf8" fill-opacity=".46">
    <rect x="4" y="4"    width="11" height="11.5" rx="1.3"/>
    <rect x="4" y="16.5" width="11" height="11.5" rx="1.3"/>
  </g>

  <!-- high-res: same footprint, saturated and finely divided -->
  <rect x="17" y="4" width="11" height="24" rx="1.3" fill="url(#hi)"/>
  <rect x="17" y="4" width="11" height="24" rx="1.3" fill="url(#grid)"/>
</svg>
