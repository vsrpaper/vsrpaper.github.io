<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1060" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0284c7"/><stop offset=".5" stop-color="#0d9488"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.55"/></filter>
  </defs>
  <style>
    .title{font-size:27px;font-weight:800;fill:#f1f5f9}
    .sub{font-size:13.5px;fill:#94a3b8}
    .sectag{font-size:14px;font-weight:800;letter-spacing:.6px}
    .ctitle{font-size:13.5px;font-weight:700;fill:#dbe4ef}
    .axlab{font-size:11px;fill:#8ea3bd}
    .val{font-size:12px;font-weight:700;fill:#e2e8f0}
    .vals{font-size:10.5px;font-weight:700;fill:#e2e8f0}
    .cat{font-size:12px;fill:#cbd5e1}
    .note{font-size:11px;fill:#93a4bb}
    .lg{font-size:12px;fill:#cbd5e1}
    .stath{font-size:11px;font-weight:800;letter-spacing:.4px}
    .statbig{font-size:19px;font-weight:800}
    .statsub{font-size:10px;fill:#8ea3bd}
    .llab{font-size:11.5px;font-weight:700}
  </style>
  <rect width="1280" height="1060" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#accentbar)"/>
  <text class="title" x="40" y="46">Why It Works &#8212; Robust Flow &amp; Task-Aligned Prior</text>
  <text class="sub" x="41" y="68">The two design choices that break standard VSR at 8K, isolated on two datasets: adapted optical flow, and a task-aligned super-resolution prior.</text>

  <!-- ============================================================ SECTION A: FLOW -->
  <rect x="30" y="88" width="1220" height="428" rx="16" fill="#0c1526" stroke="#1c2c44"/>
  <text class="sectag" x="50" y="118" fill="#7dd3fc">1 &#183; DEGRADATION-ROBUST FLOW</text>
  <g transform="translate(838,96)">
    <rect x="0" y="0" width="392" height="30" rx="8" fill="#111c30" stroke="#26374f"/>
    <rect x="16" y="9" width="15" height="12" rx="3" fill="#f43f5e"/><text class="lg" x="38" y="19">Pretrained flow</text>
    <rect x="196" y="9" width="15" height="12" rx="3" fill="#0284c7"/><text class="lg" x="218" y="19">Fine-tuned flow (ours)</text>
  </g>

  <!-- Chart A: failure rate -->
  <text class="ctitle" x="60" y="150">Catastrophic flow-failure rate at &#215;16  (lower is better)</text>
  <g stroke="#22344c" stroke-width="1">
    <line x1="130" y1="392" x2="560" y2="392"/><line x1="130" y1="344" x2="560" y2="344"/>
    <line x1="130" y1="297" x2="560" y2="297"/><line x1="130" y1="249" x2="560" y2="249"/><line x1="130" y1="202" x2="560" y2="202"/>
  </g>
  <g class="axlab" text-anchor="end">
    <text x="122" y="396">0</text><text x="122" y="348">5</text><text x="122" y="301">10</text><text x="122" y="253">15</text><text x="122" y="206">20</text>
  </g>
  <text class="axlab" x="86" y="300" transform="rotate(-90 86 300)" text-anchor="middle">failure rate (%)</text>
  <line x1="130" y1="392" x2="560" y2="392" stroke="#3a4d68" stroke-width="1.5"/>
  <rect x="180" y="212" width="50" height="180" rx="4" fill="#f43f5e"/>
  <rect x="238" y="293" width="50" height="99" rx="4" fill="#0284c7"/>
  <text class="val" x="205" y="204" text-anchor="middle">19.0</text>
  <text class="val" x="263" y="285" text-anchor="middle">10.4</text>
  <text class="cat" x="234" y="410" text-anchor="middle">gap &gt; 5 px</text>
  <text x="150" y="272" font-size="11.5" font-weight="800" fill="#6ee7b7" text-anchor="middle">&#8722;45%</text>
  <path d="M205,240 C160,240 150,302 236,322" fill="none" stroke="#34d399" stroke-width="1.4" stroke-dasharray="4 3"/>
  <rect x="395" y="300" width="50" height="92" rx="4" fill="#f43f5e"/>
  <rect x="453" y="349" width="50" height="43" rx="4" fill="#0284c7"/>
  <text class="val" x="420" y="292" text-anchor="middle">9.7</text>
  <text class="val" x="478" y="341" text-anchor="middle">4.5</text>
  <text class="cat" x="449" y="410" text-anchor="middle">gap &gt; 10 px</text>
  <text x="540" y="332" font-size="11.5" font-weight="800" fill="#6ee7b7" text-anchor="middle">&#8722;54%</text>
  <path d="M420,320 C520,320 530,354 503,368" fill="none" stroke="#34d399" stroke-width="1.4" stroke-dasharray="4 3"/>

  <!-- Chart B: degradation gap -->
  <text class="ctitle" x="640" y="150">Relative degradation gap G&#8347; (median) vs scale  (&#215;16 = deployment; lower better)</text>
  <g stroke="#22344c" stroke-width="1">
    <line x1="720" y1="392" x2="1160" y2="392"/><line x1="720" y1="329" x2="1160" y2="329"/>
    <line x1="720" y1="265" x2="1160" y2="265"/><line x1="720" y1="202" x2="1160" y2="202"/>
  </g>
  <g class="axlab" text-anchor="end">
    <text x="712" y="396">0</text><text x="712" y="333">.2</text><text x="712" y="269">.4</text><text x="712" y="206">.6</text>
  </g>
  <line x1="720" y1="392" x2="1160" y2="392" stroke="#3a4d68" stroke-width="1.5"/>
  <rect x="752" y="207" width="42" height="185" rx="4" fill="#f43f5e"/>
  <rect x="806" y="235" width="42" height="157" rx="4" fill="#0284c7"/>
  <text class="vals" x="773" y="200" text-anchor="middle">.583</text><text class="vals" x="827" y="228" text-anchor="middle">.496</text>
  <text class="cat" x="800" y="410" text-anchor="middle">&#215;16</text>
  <rect x="892" y="204" width="42" height="188" rx="4" fill="#f43f5e"/>
  <rect x="946" y="216" width="42" height="176" rx="4" fill="#0284c7"/>
  <text class="vals" x="913" y="197" text-anchor="middle">.594</text><text class="vals" x="967" y="209" text-anchor="middle">.556</text>
  <text class="cat" x="940" y="410" text-anchor="middle">&#215;32</text>
  <rect x="1032" y="210" width="42" height="182" rx="4" fill="#f43f5e"/>
  <rect x="1086" y="209" width="42" height="183" rx="4" fill="#0284c7"/>
  <text class="vals" x="1053" y="203" text-anchor="middle">.574</text><text class="vals" x="1107" y="202" text-anchor="middle">.578</text>
  <text class="cat" x="1080" y="410" text-anchor="middle">&#215;64</text>
  <text class="note" x="720" y="434">Gain is largest at &#215;16 and narrows at more extreme degradations.</text>

  <!-- stat strip A -->
  <g filter="url(#sh)"><rect x="60" y="452" width="540" height="56" rx="11" fill="#0e2417" stroke="#34d399" stroke-width="1.6"/></g>
  <text class="stath" x="76" y="472" fill="#6ee7b7">NO-HARM &#183; ADAPTATION IS FREE</text>
  <text class="note" x="76" y="490" fill="#a9c7b8">Clean-flow error 0.0115 &#8594; 0.0115  (n.s., d<tspan baseline-shift="sub" font-size="8">z</tspan> = &#8722;0.05). Nothing lost on clean content;</text>
  <text class="note" x="76" y="503" fill="#a9c7b8">the fix targets only the degraded regime.</text>

  <g filter="url(#sh)"><rect x="620" y="452" width="600" height="56" rx="11" fill="#1a1420" stroke="#f43f5e" stroke-width="1.6"/></g>
  <text class="stath" x="636" y="472" fill="#fda4af">DOWNSTREAM &#183; ROBUST FLOW &#8594; PRETRAINED DEGRADES RECONSTRUCTION (SEPE / VIDEA)</text>
  <text class="note" x="636" y="490" fill="#d3aab4">PSNR &#8722;4.1 / &#8722;5.7%&#160;&#160;&#160;SSIM &#8722;8.5 / &#8722;12.6%&#160;&#160;&#160;VMAF &#8722;26 / &#8722;18%&#160;&#160;&#160;DISTS +7.3 / +16.1%</text>
  <text class="note" x="636" y="503" fill="#d3aab4">Flow reliability is a genuine bottleneck &#8212; measured with an independent RAFT probe (no circularity).</text>

  <!-- ============================================================ SECTION B: PRIOR  (wider gap above) -->
  <rect x="30" y="560" width="1220" height="480" rx="16" fill="#0e0c1c" stroke="#2a2440"/>
  <text class="sectag" x="50" y="590" fill="#5eead4">2 &#183; TASK-ALIGNED PRIOR (SuperPrior)</text>
  <g transform="translate(700,570)">
    <rect x="0" y="0" width="530" height="30" rx="8" fill="#141024" stroke="#3a2d5c"/>
    <rect x="14" y="9" width="15" height="12" rx="3" fill="#d97706"/><text class="lg" x="36" y="19">ADISTS (texture)</text>
    <rect x="182" y="9" width="15" height="12" rx="3" fill="#8b5cf6"/><text class="lg" x="204" y="19">SuperPrior-PT</text>
    <rect x="330" y="9" width="15" height="12" rx="3" fill="#0d9488"/><text class="lg" x="352" y="19">SuperPrior-FT (ours)</text>
  </g>

  <!-- Chart C: retrieval slope (VIDEA) -->
  <text class="ctitle" x="60" y="624">Identity preservation &#8212; top-1 retrieval, VIDEA  (higher better; gap widens with scale)</text>
  <g stroke="#22344c" stroke-width="1">
    <line x1="240" y1="646" x2="560" y2="646"/><line x1="240" y1="696" x2="560" y2="696"/>
    <line x1="240" y1="746" x2="560" y2="746"/><line x1="240" y1="796" x2="560" y2="796"/><line x1="240" y1="846" x2="560" y2="846"/>
  </g>
  <g class="axlab" text-anchor="end">
    <text x="232" y="650">.8</text><text x="232" y="700">.7</text><text x="232" y="750">.6</text><text x="232" y="800">.5</text><text x="232" y="850">.4</text>
  </g>
  <line x1="240" y1="796" x2="560" y2="796" stroke="#64748b" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text class="note" x="246" y="790" fill="#94a3b8">chance</text>
  <text class="cat" x="320" y="868" text-anchor="middle">&#215;4</text>
  <text class="cat" x="500" y="868" text-anchor="middle">&#215;64</text>
  <line x1="320" y1="706" x2="500" y2="806" stroke="#d97706" stroke-width="2.6"/>
  <circle cx="320" cy="706" r="5" fill="#d97706"/><circle cx="500" cy="806" r="5" fill="#d97706"/>
  <text class="vals" x="308" y="698" text-anchor="end">.68</text>
  <text class="llab" x="512" y="810" fill="#fbbf24">ADISTS .48</text>
  <line x1="320" y1="691" x2="500" y2="756" stroke="#8b5cf6" stroke-width="2.6"/>
  <circle cx="320" cy="691" r="5" fill="#8b5cf6"/><circle cx="500" cy="756" r="5" fill="#8b5cf6"/>
  <text class="vals" x="308" y="683" text-anchor="end">.71</text>
  <text class="llab" x="512" y="754" fill="#c4b5fd">PT .58</text>
  <line x1="320" y1="661" x2="500" y2="726" stroke="#0d9488" stroke-width="3"/>
  <circle cx="320" cy="661" r="5.5" fill="#0d9488"/><circle cx="500" cy="726" r="5.5" fill="#0d9488"/>
  <text class="vals" x="308" y="653" text-anchor="end">.77</text>
  <text class="llab" x="512" y="724" fill="#5eead4">FT .64</text>
  <path d="M574,726 L582,726 L582,806 L574,806" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
  <text class="note" x="588" y="762" fill="#cbd5e1">widening</text>
  <text class="note" x="588" y="776" fill="#cbd5e1">gap</text>

  <!-- Chart D: temporal coherence bars (SEPE x4) -->
  <text class="ctitle" x="700" y="624">Temporal coherence &#8212; flow-warp feature error, SEPE &#215;4  (lower is better)</text>
  <g stroke="#22344c" stroke-width="1">
    <line x1="840" y1="648" x2="840" y2="786"/><line x1="924" y1="648" x2="924" y2="786"/>
    <line x1="1008" y1="648" x2="1008" y2="786"/><line x1="1092" y1="648" x2="1092" y2="786"/>
  </g>
  <g class="axlab" text-anchor="middle">
    <text x="840" y="802">0</text><text x="924" y="802">.2</text><text x="1008" y="802">.4</text><text x="1092" y="802">.6</text>
  </g>
  <rect x="840" y="660" width="247" height="28" rx="4" fill="#d97706"/>
  <text class="cat" x="832" y="679" text-anchor="end" fill="#fbbf24">ADISTS</text>
  <text class="vals" x="1095" y="679">0.588</text>
  <text class="note" x="900" y="679" fill="#1b1206">&#8776; 3&#215; worse</text>
  <rect x="840" y="708" width="105" height="28" rx="4" fill="#8b5cf6"/>
  <text class="cat" x="832" y="727" text-anchor="end" fill="#c4b5fd">SuperPrior-PT</text>
  <text class="vals" x="953" y="727">0.249</text>
  <rect x="840" y="756" width="79" height="28" rx="4" fill="#0d9488"/>
  <text class="cat" x="832" y="775" text-anchor="end" fill="#5eead4">SuperPrior-FT</text>
  <text class="vals" x="927" y="775">0.188</text>
  <text class="note" x="700" y="840" fill="#93a4bb">The clearest discriminator: SuperPrior-FT is the smoothest prior at every scale (d<tspan baseline-shift="sub" font-size="8">z</tspan> up to 3.4; p &lt; 10&#8315;&#8312;&#8304;).</text>

  <!-- takeaway strip B -->
  <g filter="url(#sh)"><rect x="60" y="884" width="150" height="130" rx="12" fill="#1a1206" stroke="#d97706" stroke-width="1.8"/></g>
  <text class="stath" x="78" y="910" fill="#fbbf24">NULL PRIOR</text>
  <text class="statbig" x="78" y="946" fill="#fbbf24">+373%</text>
  <text class="statsub" x="78" y="966">DISTS error</text>
  <text class="statsub" x="78" y="988" fill="#a9b7cd">zeroed conditioning</text>

  <g filter="url(#sh)"><rect x="222" y="884" width="160" height="130" rx="12" fill="#241016" stroke="#f43f5e" stroke-width="1.8"/></g>
  <text class="stath" x="240" y="910" fill="#fda4af">NOISE PRIOR</text>
  <text class="statbig" x="240" y="946" fill="#fda4af">+1227%</text>
  <text class="statsub" x="240" y="966">DISTS error</text>
  <text class="statsub" x="240" y="988" fill="#a9b7cd">worse than none</text>

  <g filter="url(#sh)"><rect x="394" y="884" width="300" height="130" rx="12" fill="#0e0c1c" stroke="#5b6b8c" stroke-width="1.4"/></g>
  <text class="stath" x="412" y="910" fill="#cbd5e1">END-TO-END ORDERING</text>
  <text x="412" y="942" font-size="15" font-weight="800"><tspan fill="#5eead4">FT</tspan><tspan fill="#93a4bb"> &gt; </tspan><tspan fill="#c4b5fd">PT</tspan><tspan fill="#93a4bb"> &gt; </tspan><tspan fill="#fbbf24">ADISTS</tspan></text>
  <text class="statsub" x="412" y="966" fill="#a9b7cd">mirrors the intrinsic diagnostics.</text>
  <text class="statsub" x="412" y="986" fill="#a9b7cd">FT at 70% training already beats</text>
  <text class="statsub" x="412" y="1002" fill="#a9b7cd">PT at 100% on all five metrics.</text>

  <g filter="url(#sh)"><rect x="706" y="884" width="514" height="130" rx="12" fill="#0d1f1c" stroke="#0d9488" stroke-width="1.8"/></g>
  <text class="stath" x="726" y="910" fill="#5eead4">TAKEAWAY &#183; TEXTURE IS NOT STRUCTURE</text>
  <text class="note" x="726" y="936" fill="#bfe3dd">ADISTS is the richest &#8212; and most expensive &#8212; prior, yet the worst on</text>
  <text class="note" x="726" y="956" fill="#bfe3dd">every probe and end to end. Extra capacity is ruled out as the explanation.</text>
  <text class="note" x="726" y="980" fill="#bfe3dd">What survives into the extreme-scale regime is task-relevant geometry and</text>
  <text class="note" x="726" y="1000" fill="#bfe3dd">temporal coherence &#8212; not texture energy. That is what Ctrl-Plus-8K conditions on.</text>

  <text class="note" x="1240" y="1052" text-anchor="end">Ctrl-Plus-8K &#183; why it works: flow robustness + task-aligned prior</text>
</svg>
