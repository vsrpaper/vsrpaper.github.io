<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset=".5" stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.55"/></filter>
    <marker id="arS" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="arT" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fb7185"/></marker>
  </defs>
  <style>
    .title{font-size:28px;font-weight:800;fill:#f1f5f9}
    .sub{font-size:14px;fill:#94a3b8}
    .mod{font-size:16px;font-weight:700}
    .sym{font-size:13px;fill:#cbd5e1}
    .note{font-size:11.5px;fill:#8ea3bd}
    .ten{font-size:12px;fill:#b6c6db;font-style:italic}
    .sec{font-size:13px;font-weight:700;letter-spacing:.6px}
  </style>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#accentbar)"/>
  <text class="title" x="40" y="50">Tile-Based Processing &amp; Stitched Supervision</text>
  <text class="sub" x="41" y="72">The network always works on fixed 512&#215;512 tiles; the loss is evaluated on the re-assembled crop so gradients cross tile seams.</text>

  <!-- ===== TRAINING ROW ===== -->
  <text class="sec" x="40" y="120" fill="#fda4af">TRAINING  &#8212;  stitched supervision on a 1024&#178; crop</text>

  <!-- GT crop -->
  <g filter="url(#sh)"><rect x="40" y="140" width="150" height="150" rx="12" fill="#14263a" stroke="#34d399" stroke-width="2"/></g>
  <text class="mod" x="115" y="168" text-anchor="middle" fill="#6ee7b7">GT crop</text>
  <rect x="70" y="182" width="90" height="90" fill="#12303f" stroke="#34d399"/>
  <text class="sym" x="115" y="288" text-anchor="middle">1024 &#215; 1024</text>

  <!-- split 2x2 -->
  <g filter="url(#sh)"><rect x="250" y="140" width="160" height="150" rx="12" fill="#152238" stroke="#2dd4bf" stroke-width="2"/></g>
  <text class="mod" x="330" y="166" text-anchor="middle" fill="#5eead4">2&#215;2 split</text>
  <g transform="translate(288,178)">
    <rect x="0" y="0" width="44" height="44" fill="#173a3a" stroke="#2dd4bf"/><rect x="46" y="0" width="44" height="44" fill="#173a3a" stroke="#2dd4bf"/>
    <rect x="0" y="46" width="44" height="44" fill="#173a3a" stroke="#2dd4bf"/><rect x="46" y="46" width="44" height="44" fill="#173a3a" stroke="#2dd4bf"/>
  </g>
  <text class="note" x="330" y="285" text-anchor="middle">four 512&#178; tiles</text>

  <!-- shared network -->
  <g filter="url(#sh)"><rect x="470" y="150" width="180" height="130" rx="13" fill="#152238" stroke="#2dd4bf" stroke-width="2.5"/></g>
  <text class="mod" x="560" y="200" text-anchor="middle" fill="#5eead4">Ctrl-Plus-8K</text>
  <text class="mod" x="560" y="220" text-anchor="middle" fill="#5eead4">network</text>
  <text class="sym" x="560" y="244" text-anchor="middle">per-tile SR</text>
  <text class="note" x="560" y="262" text-anchor="middle">shared weights &#215;4</text>

  <!-- stitch -->
  <g filter="url(#sh)"><rect x="710" y="140" width="160" height="150" rx="12" fill="#1b1420" stroke="#fb7185" stroke-width="2"/></g>
  <text class="mod" x="790" y="166" text-anchor="middle" fill="#fda4af">stitch &#8594; Y&#770;</text>
  <g transform="translate(748,178)">
    <rect x="0" y="0" width="90" height="90" fill="#2b1a24" stroke="#fb7185"/>
    <line x1="45" y1="0" x2="45" y2="90" stroke="#fb7185" stroke-dasharray="3 3"/>
    <line x1="0" y1="45" x2="90" y2="45" stroke="#fb7185" stroke-dasharray="3 3"/>
  </g>
  <text class="note" x="790" y="285" text-anchor="middle">1024&#178; prediction</text>

  <!-- loss -->
  <g filter="url(#sh)"><rect x="930" y="150" width="230" height="130" rx="14" fill="#2a1119" stroke="#fb7185" stroke-width="2.5"/></g>
  <text class="mod" x="1045" y="188" text-anchor="middle" fill="#fecdd3">Loss on stitched crop</text>
  <text class="sym" x="1045" y="214" text-anchor="middle">&#8466; = &#8466;_char + 0.1&#183;&#8466;_guide</text>
  <text class="note" x="1045" y="236" text-anchor="middle">Charbonnier (pixel, cross-seam)</text>
  <text class="note" x="1045" y="253" text-anchor="middle">+ X3D spatiotemporal guidance</text>
  <text class="note" x="1045" y="270" text-anchor="middle">vs GT clip Y</text>

  <line x1="190" y1="215" x2="248" y2="215" stroke="#94a3b8" stroke-width="2" marker-end="url(#arS)"/>
  <line x1="410" y1="215" x2="468" y2="215" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arT)"/>
  <text class="ten" x="439" y="207" text-anchor="middle">512&#178;</text>
  <line x1="650" y1="215" x2="708" y2="215" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arT)"/>
  <line x1="870" y1="215" x2="928" y2="215" stroke="#fb7185" stroke-width="2" marker-end="url(#arR)"/>
  <text class="ten" x="899" y="207" text-anchor="middle">Y&#770;</text>

  <!-- key idea callout -->
  <rect x="470" y="300" width="510" height="34" rx="8" fill="#160f18" stroke="#fb7185" stroke-dasharray="6 4"/>
  <text class="note" x="490" y="322" fill="#fda4af">Key: supervising the stitched crop penalizes cross-tile discontinuities &#8594; seamless output</text>

  <!-- ===== INFERENCE ROW ===== -->
  <text class="sec" x="40" y="410" fill="#7dd3fc">INFERENCE  &#8212;  partition, super-resolve, re-assemble at 8K</text>

  <g filter="url(#sh)"><rect x="40" y="430" width="170" height="150" rx="12" fill="#0f2033" stroke="#38bdf8" stroke-width="2"/></g>
  <text class="mod" x="125" y="458" text-anchor="middle" fill="#7dd3fc">8K LR frame</text>
  <g transform="translate(66,470)">
    <rect x="0" y="0" width="118" height="66" fill="#123047" stroke="#38bdf8"/>
    <line x1="39" y1="0" x2="39" y2="66" stroke="#38bdf8" stroke-dasharray="3 3"/><line x1="78" y1="0" x2="78" y2="66" stroke="#38bdf8" stroke-dasharray="3 3"/>
    <line x1="0" y1="33" x2="118" y2="33" stroke="#38bdf8" stroke-dasharray="3 3"/>
  </g>
  <text class="note" x="125" y="572" text-anchor="middle">partitioned into 512&#178; tiles</text>

  <g filter="url(#sh)"><rect x="270" y="450" width="180" height="110" rx="13" fill="#152238" stroke="#2dd4bf" stroke-width="2.5"/></g>
  <text class="mod" x="360" y="498" text-anchor="middle" fill="#5eead4">per-tile SR</text>
  <text class="note" x="360" y="520" text-anchor="middle">independent, shared weights</text>

  <g filter="url(#sh)"><rect x="510" y="430" width="180" height="150" rx="12" fill="#14263a" stroke="#34d399" stroke-width="2"/></g>
  <text class="mod" x="600" y="458" text-anchor="middle" fill="#6ee7b7">re-assemble</text>
  <rect x="536" y="470" width="128" height="72" fill="#12303f" stroke="#34d399"/>
  <text class="sym" x="600" y="562" text-anchor="middle">full 8K output</text>

  <line x1="210" y1="505" x2="268" y2="505" stroke="#38bdf8" stroke-width="2" marker-end="url(#arS)"/>
  <line x1="450" y1="505" x2="508" y2="505" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arT)"/>

  <!-- ===== budget box ===== -->
  <g filter="url(#sh)"><rect x="740" y="420" width="420" height="180" rx="14" fill="#141024" stroke="#a78bfa" stroke-width="2"/></g>
  <text class="mod" x="762" y="452" fill="#c4b5fd">Spatial&#8211;Temporal Compute Budget</text>
  <text class="sym" x="762" y="480">Under fixed memory M:  P&#178; T &#8776; const</text>
  <text class="note" x="762" y="503">tile side P &#8596; clip length T trade off</text>
  <!-- sweet spot -->
  <g transform="translate(762,516)">
    <rect x="0" y="0" width="120" height="56" rx="9" fill="#1a1330" stroke="#5b6b8c"/>
    <text class="note" x="60" y="24" text-anchor="middle" fill="#8ea3bd">256&#215;256, T=8</text>
    <text class="note" x="60" y="44" text-anchor="middle" fill="#8ea3bd">temporally greedy</text>
    <rect x="130" y="0" width="120" height="56" rx="9" fill="#22183a" stroke="#a78bfa" stroke-width="2.5"/>
    <text class="sym" x="190" y="24" text-anchor="middle" fill="#c4b5fd">512&#215;512, T=4</text>
    <text class="note" x="190" y="44" text-anchor="middle" fill="#c4b5fd">sweet spot &#9733;</text>
    <rect x="260" y="0" width="120" height="56" rx="9" fill="#1a1330" stroke="#5b6b8c"/>
    <text class="note" x="320" y="24" text-anchor="middle" fill="#8ea3bd">1024&#215;1024, T=2</text>
    <text class="note" x="320" y="44" text-anchor="middle" fill="#8ea3bd">spatially greedy</text>
  </g>

  <text class="note" x="1240" y="720" text-anchor="end">Ctrl-Plus-8K &#183; tiling &amp; supervision (detail 1 of 4)</text>
</svg>
