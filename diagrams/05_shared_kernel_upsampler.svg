<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fbbf24"/><stop offset=".5" stop-color="#38bdf8"/><stop offset="1" stop-color="#2dd4bf"/></linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.55"/></filter>
    <marker id="arS" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="arT" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
    <marker id="arA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fbbf24"/></marker>
    <marker id="arK" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#38bdf8"/></marker>
  </defs>
  <style>
    .title{font-size:28px;font-weight:800;fill:#f1f5f9}
    .sub{font-size:14px;fill:#94a3b8}
    .mod{font-size:16px;font-weight:700}
    .sym{font-size:13px;fill:#cbd5e1}
    .note{font-size:11.5px;fill:#8ea3bd}
    .ten{font-size:12px;fill:#b6c6db;font-style:italic}
    .sec{font-size:13px;font-weight:700;letter-spacing:.6px}
    .big{font-size:15px;font-weight:700;fill:#fcd34d}
  </style>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#accentbar)"/>
  <text class="title" x="40" y="50">Shared Continuous-Kernel Upsampler</text>
  <text class="sub" x="41" y="72">A hyper-network predicts the upsampling kernel ONCE per clip; per-frame residuals still inject frame-specific detail, so arbitrary-scale reconstruction adds almost no per-frame cost.</text>

  <!-- ==== predict-once (top, blue) ==== -->
  <rect x="40" y="110" width="560" height="230" rx="16" fill="#0d1a2c" stroke="#38bdf8" stroke-width="1.4" stroke-dasharray="8 5"/>
  <text class="sec" x="60" y="138" fill="#7dd3fc">PREDICTED ONCE PER CLIP</text>

  <!-- inputs -->
  <g filter="url(#sh)"><rect x="60" y="156" width="140" height="60" rx="11" fill="#152238" stroke="#2dd4bf" stroke-width="2"/></g>
  <text class="mod" x="130" y="184" text-anchor="middle" fill="#5eead4">initial state</text>
  <text class="sym" x="130" y="205" text-anchor="middle">h&#8320;</text>

  <g filter="url(#sh)"><rect x="60" y="240" width="140" height="80" rx="11" fill="#101c30" stroke="#38bdf8" stroke-width="2"/></g>
  <text class="mod" x="130" y="266" text-anchor="middle" fill="#7dd3fc">target grid</text>
  <text class="sym" x="130" y="288" text-anchor="middle">C (coords)</text>
  <text class="sym" x="130" y="306" text-anchor="middle">u (cell sizes)</text>

  <!-- KP -->
  <g filter="url(#sh)"><rect x="280" y="170" width="290" height="140" rx="14" fill="#1c1608" stroke="#fbbf24" stroke-width="2.8"/></g>
  <text class="big" x="425" y="206" text-anchor="middle">Kernel Predictor  &#119974;&#119979;</text>
  <text class="sym" x="425" y="234" text-anchor="middle">w = KP(h&#8320;, C, u)</text>
  <text class="note" x="425" y="258" text-anchor="middle">coordinate-conditioned hyper-network</text>
  <text class="note" x="425" y="278" text-anchor="middle">the expensive per-pixel coordinate MLP</text>
  <text class="note" x="425" y="296" text-anchor="middle">over the 8K grid is paid a single time</text>

  <line x1="200" y1="186" x2="278" y2="210" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arT)"/>
  <line x1="200" y1="280" x2="278" y2="256" stroke="#38bdf8" stroke-width="2" marker-end="url(#arK)"/>

  <!-- kernel out -->
  <g filter="url(#sh)"><rect x="640" y="200" width="120" height="80" rx="12" fill="#2a2008" stroke="#fbbf24" stroke-width="2.5"/></g>
  <text class="mod" x="700" y="236" text-anchor="middle" fill="#fcd34d">kernel w</text>
  <text class="note" x="700" y="256" text-anchor="middle">shared across clip</text>
  <line x1="570" y1="240" x2="638" y2="240" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arA)"/>

  <!-- ==== per-frame path (bottom) ==== -->
  <text class="sec" x="40" y="404" fill="#fcd34d">PER FRAME  &#8212;  reused kernel + frame-specific residual</text>

  <g filter="url(#sh)"><rect x="40" y="424" width="150" height="70" rx="12" fill="#101c30" stroke="#38bdf8" stroke-width="2"/></g>
  <text class="mod" x="115" y="456" text-anchor="middle" fill="#7dd3fc">residual r&#8348;&#8331;&#8342;</text>
  <text class="note" x="115" y="476" text-anchor="middle">from fusion (per frame)</text>

  <g filter="url(#sh)"><rect x="40" y="520" width="150" height="70" rx="12" fill="#152238" stroke="#2dd4bf" stroke-width="2"/></g>
  <text class="mod" x="115" y="552" text-anchor="middle" fill="#5eead4">LR anchor x&#8348;&#8331;&#8342;</text>
  <text class="note" x="115" y="572" text-anchor="middle">base content</text>

  <!-- UP operator -->
  <g filter="url(#sh)"><rect x="330" y="440" width="300" height="150" rx="14" fill="#1c1608" stroke="#fbbf24" stroke-width="2.8"/></g>
  <text class="big" x="480" y="478" text-anchor="middle">Continuous Upsampler  &#119984;&#119979;</text>
  <text class="sym" x="480" y="506" text-anchor="middle">&#375;&#8348;&#8331;&#8342; = UP(r&#8348;&#8331;&#8342;, w, C, x&#8348;&#8331;&#8342;)</text>
  <text class="note" x="480" y="530" text-anchor="middle">continuous operator sampled on grid C</text>
  <text class="note" x="480" y="550" text-anchor="middle">fuses residual detail with LR anchor</text>
  <text class="note" x="480" y="570" text-anchor="middle">at the requested (non-integer) scale</text>

  <line x1="190" y1="459" x2="328" y2="480" stroke="#38bdf8" stroke-width="2" marker-end="url(#arK)"/>
  <line x1="190" y1="555" x2="328" y2="545" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arT)"/>
  <path d="M700,280 L700,360 L480,360 L480,438" fill="none" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arA)"/>
  <text class="ten" x="560" y="352" text-anchor="middle" fill="#fcd34d">shared kernel w</text>

  <!-- output -->
  <g filter="url(#sh)"><rect x="700" y="470" width="150" height="90" rx="13" fill="#14263a" stroke="#34d399" stroke-width="2.3"/></g>
  <text class="mod" x="775" y="508" text-anchor="middle" fill="#6ee7b7">SR frame</text>
  <text class="sym" x="775" y="530" text-anchor="middle">&#375;&#8348;&#8331;&#8342;</text>
  <text class="note" x="775" y="548" text-anchor="middle">on continuous grid</text>
  <line x1="630" y1="515" x2="698" y2="515" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arA)"/>

  <!-- scale strip -->
  <g filter="url(#sh)"><rect x="900" y="150" width="330" height="190" rx="14" fill="#141024" stroke="#a78bfa" stroke-width="2"/></g>
  <text class="mod" x="922" y="182" fill="#c4b5fd">Arbitrary / continuous scale</text>
  <text class="note" x="922" y="208" fill="#a9b7cd">Scale is encoded entirely by (C, u):</text>
  <text class="note" x="922" y="228" fill="#a9b7cd">one trained network, any factor.</text>
  <g transform="translate(922,244)">
    <rect x="0" y="0" width="286" height="26" rx="13" fill="#0f1830" stroke="#5b6b8c"/>
    <rect x="0" y="0" width="120" height="26" rx="13" fill="#22183a" stroke="#a78bfa"/>
    <text class="note" x="16" y="17" fill="#c4b5fd">&#215;2.5</text>
    <text class="note" x="130" y="17" fill="#8ea3bd">&#215;16</text>
    <text class="note" x="250" y="17" fill="#8ea3bd">&#215;64</text>
  </g>
  <text class="note" x="922" y="300" fill="#c4b5fd">no per-scale retraining</text>
  <text class="note" x="922" y="320" fill="#a9b7cd">non-integer factors supported directly</text>

  <!-- key result -->
  <g filter="url(#sh)"><rect x="700" y="600" width="530" height="90" rx="14" fill="#0d1a2c" stroke="#38bdf8" stroke-width="1.6" stroke-dasharray="6 4"/></g>
  <text class="mod" x="722" y="630" fill="#7dd3fc">Why it&#8217;s cheap</text>
  <text class="note" x="722" y="654" fill="#a9b7cd">Kernel cost is paid once, not per frame &#8594; upsampling cost is effectively</text>
  <text class="note" x="722" y="672" fill="#a9b7cd">independent of clip length, with no measurable quality loss.</text>

  <text class="note" x="1240" y="724" text-anchor="end">Ctrl-Plus-8K &#183; shared-kernel upsampler (detail 4 of 4)</text>
</svg>
